<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Glowing connecting vectors matching app's brand system -->
  <line x1="16" y1="7" x2="10" y2="13" stroke="#C8F135" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85" />
  <line x1="16" y1="7" x2="22" y2="13" stroke="#C8F135" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85" />
  <line x1="10" y1="13" x2="22" y2="13" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2" />
  <line x1="10" y1="13" x2="16" y2="25" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85" />
  <line x1="22" y1="13" x2="16" y2="25" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85" />
  
  <!-- Minimalist Tech Network Nodes matching the exact app colors -->
  <!-- Stem Node (V5 Neon Lime Green - primary support color) -->
  <circle cx="16" cy="7" r="3.5" fill="#C8F135" />
  <!-- Shoulder Nodes (Vibrant Orange - secondary dashboard color) -->
  <circle cx="10" cy="13" r="4.5" fill="#ff6b35" />
  <circle cx="22" cy="13" r="4.5" fill="#ff6b35" />
  <!-- Apex Node (Oppose Crimson Red) -->
  <circle cx="16" cy="25" r="5" fill="#ff4444" />
</svg>
